<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    html,
    body {
      height: 100%;
      background: #0f1014;
      color: #a1a1aa;
      font-family:
        "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
        sans-serif;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      justify-content: center;
      height: 100%;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .logo {
      width: 40px;
      height: 40px;
      opacity: 0.85;
      animation: logoPulse 2.4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,
      100% {
        opacity: 0.7;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }
    .label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.01em;
    }
    .progress-track {
      width: 120px;
      height: 2px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 1px;
    }
    .progress-bar {
      width: 40%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 1px;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(400%);
      }
    }
    </style>
  </head>
  <body>
    <div class="container">
      <svg
        class="logo"
        fill="none"
        viewBox="0 0 1218 1218"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M608.75 48L1065.5 276.375L608.75 504.75L152 276.375L608.75 48Z"
          fill="white"
        />
        <path
          d="M152 352.5L570.688 561.844V714.094L152 504.75V352.5Z"
          fill="white"
          opacity="0.8"
        />
        <path
          d="M152 580.875L570.688 790.219V942.469L152 733.125V580.875Z"
          fill="white"
          opacity="0.5"
        />
        <path
          d="M152 809.25L570.688 1018.59V1170.84L152 961.5V809.25Z"
          fill="white"
          opacity="0.2"
        />
        <path
          d="M646.812 561.844L1065.5 352.5V504.75L646.812 714.094V561.844Z"
          fill="white"
          opacity="0.6"
        />
        <path
          d="M646.812 790.219L1065.5 580.875V733.125L646.812 942.469V790.219Z"
          fill="white"
          opacity="0.3"
        />
        <path
          d="M646.812 1018.59L1065.5 809.25V961.5L646.812 1170.84V1018.59Z"
          fill="white"
          opacity="0.1"
        />
      </svg>
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <div class="label">Starting Echoform</div>
    </div>
  </body>
</html>
