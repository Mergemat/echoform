<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    html,
    body {
      height: 100%;
      background: #0f1014;
      color: #a1a1aa;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #27272a;
      border-top-color: #a1a1aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <div class="label">Starting Echoform…</div>
    </div>
  </body>
</html>
