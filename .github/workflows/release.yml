name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --generate-notes \
            --title "$TAG_NAME"

  macos-release:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify repository
        run: bun run check
        working-directory: apps/desktop

      - name: Build release artifacts
        run: bun run release
        working-directory: apps/desktop

      - name: Upload macOS artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          files=(apps/desktop/release/*.dmg apps/desktop/release/*.zip apps/desktop/release/*.blockmap apps/desktop/release/latest*.yml)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found in apps/desktop/release/"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  windows-release:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: bun run release:win
        working-directory: apps/desktop

      - name: Upload Windows artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(apps/desktop/release/*.exe apps/desktop/release/*.zip apps/desktop/release/*.blockmap apps/desktop/release/latest*.yml)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found in apps/desktop/release/"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  publish-release:
    needs: [macos-release, windows-release]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false

      - name: Trigger marketing site rebuild
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
